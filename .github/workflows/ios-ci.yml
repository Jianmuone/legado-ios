name: iOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-14
    timeout-minutes: 30
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: "15.4"
    
    - name: Cache SPM Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Developer/Xcode/DerivedData
          ~/.swiftpm
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-

    - name: Prepare Build Paths
      run: |
        echo "DERIVED_DATA=$RUNNER_TEMP/LegadoDerivedData" >> "$GITHUB_ENV"
        echo "RESULT_BUNDLE=$RUNNER_TEMP/LegadoResults.xcresult" >> "$GITHUB_ENV"
    
    - name: Resolve SPM Dependencies
      run: >
        xcodebuild -resolvePackageDependencies
        -project Legado.xcodeproj
        -scheme Legado
    
    - name: Build
      run: >
        xcodebuild build
        -project Legado.xcodeproj
        -scheme Legado
        -sdk iphoneos
        -configuration Release
        -destination 'generic/platform=iOS'
        -derivedDataPath "$DERIVED_DATA"
        -resultBundlePath "$RESULT_BUNDLE"
        CODE_SIGNING_ALLOWED=NO
        CODE_SIGN_IDENTITY=""
        CODE_SIGNING_REQUIRED=NO
        IPHONEOS_DEPLOYMENT_TARGET=16.0

    - name: Check Unit Test Target
      id: test_target
      run: |
        if grep -q "com.apple.product-type.bundle.unit-test" Legado.xcodeproj/project.pbxproj; then
          echo "has_tests=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_tests=false" >> "$GITHUB_OUTPUT"
        fi
    
    - name: Run Unit Tests
      if: ${{ success() && steps.test_target.outputs.has_tests == 'true' }}
      run: >
        xcodebuild test
        -project Legado.xcodeproj
        -scheme Legado
        -sdk iphonesimulator
        -configuration Debug
        -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5'
        -derivedDataPath "$DERIVED_DATA"
        -resultBundlePath "$RESULT_BUNDLE"
        ONLY_ACTIVE_ARCH=YES
        IPHONEOS_DEPLOYMENT_TARGET=16.0

    - name: Upload Xcode Result Bundle
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Legado-xcresult
        path: ${{ env.RESULT_BUNDLE }}
        if-no-files-found: ignore
    
    - name: Upload Build Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Legado-iOS-App
        path: ${{ env.DERIVED_DATA }}/Build/Products/Release-iphoneos/Legado.app

  release:
    name: Create Release
    needs: build-and-test
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: Legado-iOS-App
        path: build/
    
    - name: Create IPA
      run: |
        mkdir -p Payload
        cp -r build/Legado.app Payload/
        zip -r Legado.ipa Payload
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: Legado.ipa
        generate_release_notes: true
        draft: false
